<a
  class="admin-card"
  [class.admin-card--disabled]="disabled()"
  [routerLink]="disabled() ? null : route()"
  [attr.aria-disabled]="disabled()"
  [attr.tabindex]="disabled() ? -1 : null"
>
  <div class="admin-card__icon" aria-hidden="true">
    <i [attr.data-lucide]="icon()"></i>
  </div>

  <div class="admin-card__content">
    <span class="admin-card__eyebrow"> Herramienta administrativa </span>

    <h3>
      {{ title() }}
    </h3>

    <p>
      {{ description() }}
    </p>
  </div>

  <div class="admin-card__action" aria-hidden="true">
    @if (disabled()) {
      <i data-lucide="lock-keyhole"></i>
    } @else {
      <i data-lucide="arrow-up-right"></i>
    }
  </div>
</a>
