<header>
  <h1>Panel de Administración</h1>

  <p>
    Bienvenido al panel de administración de MedCases.
  </p>
</header>

@if (loading()) {

<p>Cargando resumen...</p>

}

@else {

@let s = summary()!;

<div class="summary">

  <app-statistic-card
    title="Estudiantes"
    [value]="s.totalStudents"
    icon="graduation-cap" />

  <app-statistic-card
    title="Docentes"
    [value]="s.totalTeachers"
    icon="briefcase" />

  <app-statistic-card
    title="Casos"
    [value]="s.totalCases"
    icon="file-text" />

  <app-statistic-card
    title="Entregas"
    [value]="s.totalSubmissions"
    icon="inbox" />

</div>

<h2>Accesos rápidos</h2>

<div class="cards">

  <app-admin-card
    title="Usuarios autorizados"
    description="Administra estudiantes y docentes autorizados."
    icon="users"
    route="/dashboard/admin/authorized-users" />

  <app-admin-card
    title="Estadísticas"
    description="Consulta todas las métricas del sistema."
    icon="chart-column"
    route="/dashboard/admin/statistics" />

</div>

}
