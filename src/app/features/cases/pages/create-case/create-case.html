<form [formGroup]="caseForm" (ngSubmit)="submitCase()">
  <app-general-section [group]="caseForm.controls.general" />

  <app-patient-section [group]="caseForm.controls.patient" />

  <app-findings [group]="caseForm.controls.findings" />

  <app-vital-signs [group]="caseForm.controls.vitalSigns" />

  <app-neurological [group]="caseForm.controls.neurological" />

  <app-publish-case [group]="caseForm.controls.publishCase" />

  <app-feedback [control]="caseForm.controls.feedback" />

  <app-button type="submit" text="Guardar Case" />
</form>
