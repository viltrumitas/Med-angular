<section class="page">

  <div class="card">

    <header>

      <h1>Crear clase</h1>

      <p>
        Crea una nueva clase para comenzar a asignar
        casos clínicos a tus estudiantes.
      </p>

    </header>

    <form
      [formGroup]="form"
      (ngSubmit)="submit()">

      <div class="form-group">

        <label>Nombre</label>

        <input
          type="text"
          formControlName="name"
          placeholder="Ej. Urgencias Médicas 2026">

        @if (
          form.controls.name.invalid &&
          form.controls.name.touched
        ) {
          <small>
            El nombre es obligatorio.
          </small>
        }

      </div>

      <div class="form-group">

        <label>Descripción</label>

        <textarea
          rows="5"
          formControlName="description"
          placeholder="Descripción opcional">
        </textarea>

      </div>

      <div class="actions">

        <button
          type="button"
          class="secondary"
          routerLink="/teacher/classroom">

          Cancelar

        </button>

        <button
          type="submit"
          class="primary"
          [disabled]="loading()">

          @if (loading()) {
            Creando...
          } @else {
            Crear clase
          }

        </button>

      </div>

    </form>

  </div>

</section>
