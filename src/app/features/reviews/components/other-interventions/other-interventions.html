<section class="assessment-grid" [formGroup]="group">
  <div class="assessment-grid__intro">
    <p>
      Evalúa el manejo clínico, las intervenciones realizadas y el desempeño operativo del
      estudiante.
    </p>
  </div>

  <div class="assessment-grid__fields">
    <div class="assessment-field assessment-field--wide">
      <span class="assessment-field__number">01</span>

      <app-input
        formControlName="vascularAccess"
        type="number"
        labelText="Accesos vasculares, soluciones, cantidades y catéter"
      />
    </div>

    <div class="assessment-field assessment-field--wide">
      <span class="assessment-field__number">02</span>

      <app-input
        formControlName="temperatureControl"
        type="number"
        labelText="Manejo adecuado de la temperatura"
      />
    </div>

    <div class="assessment-field assessment-field--wide">
      <span class="assessment-field__number">03</span>

      <app-input
        formControlName="drugAdministration"
        type="number"
        labelText="Selección, dosis y administración de fármacos"
      />
    </div>

    <div class="assessment-field">
      <span class="assessment-field__number">04</span>

      <app-input
        formControlName="patientPositioning"
        type="number"
        labelText="Posición del paciente"
      />
    </div>

    <div class="assessment-field">
      <span class="assessment-field__number">05</span>

      <app-input
        formControlName="packaging"
        type="number"
        labelText="Empaquetamiento del paciente"
      />
    </div>

    <div class="assessment-field assessment-field--wide">
      <span class="assessment-field__number">06</span>

      <app-input
        formControlName="crumRegulation"
        type="number"
        labelText="Regulación del paciente a CRUM"
      />
    </div>

    <div class="assessment-field">
      <span class="assessment-field__number">07</span>

      <app-input formControlName="uniform" type="number" labelText="Presentación y uniforme" />
    </div>

    <div class="assessment-field assessment-field--wide">
      <span class="assessment-field__number">08</span>

      <app-input
        formControlName="workTeam"
        type="number"
        labelText="Equipo de trabajo: botiquín, EPP y diagnóstico"
      />
    </div>

    <div class="assessment-field">
      <span class="assessment-field__number">09</span>

      <app-input
        formControlName="interventionsPerformed"
        type="number"
        labelText="Realiza intervenciones en el paciente"
      />
    </div>

    <div class="assessment-field">
      <span class="assessment-field__number">10</span>

      <app-input formControlName="teamWork" type="number" labelText="Trabajo en equipo" />
    </div>

    <div class="assessment-field assessment-field--wide">
      <span class="assessment-field__number">11</span>

      <app-input
        formControlName="correctDiagnosis"
        type="number"
        labelText="Identificación correcta de diagnósticos"
      />
    </div>
  </div>
</section>
