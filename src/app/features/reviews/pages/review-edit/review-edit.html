@if (loading()) {

<p>Cargando entrega...</p>

} @else if (review(); as r) {


<div class="review-edit-layout">


  <!-- CASO ARRIBA -->
  <section class="case-top">

    <app-case-content [case]="r.case" />

  </section>



  <!-- CONTENIDO PRINCIPAL -->

  <div class="content-grid">


    <!-- RESPUESTA DEL ESTUDIANTE -->

    <aside class="student-response">

      <h2>
        Respuesta del estudiante
      </h2>

      <app-submission-content [submission]="r.submission" />

    </aside>




    <!-- FORMULARIO -->

    <main class="form-panel">


      <header class="review-header">

        <h1>
          Editar evaluación
        </h1>


        <h2>
          {{ r.student.firstName }}
          {{ r.student.lastName }}
        </h2>


        <p>
          {{ r.assignment.title }}
        </p>


      </header>



      <form [formGroup]="reviewForm" (ngSubmit)="save()">


        <app-scene-management [group]="reviewForm.controls.sceneManagement" />


        <app-primary-assessment [group]="reviewForm.controls.primaryAssessment" />


        <app-patient-priority [group]="reviewForm.controls.patientPriority" />


        <app-vital-signs [group]="reviewForm.controls.vitalSigns" />


        <app-focused-assessment [group]="reviewForm.controls.focusedAssessment" />


        <app-physical-examination [group]="reviewForm.controls.physicalExamination" />


        <app-sampler [group]="reviewForm.controls.sampler" />


        <app-opqrst [group]="reviewForm.controls.opqrst" />


        <app-other-interventions [group]="reviewForm.controls.otherInterventions" />



        <div class="score-card">

          <span>
            Puntaje total
          </span>

          <strong>
            {{ totalScore() }} puntos
          </strong>

        </div>



        <div class="feedback-section">

          <h3>
            Retroalimentación
          </h3>


          <app-text-area formControlName="feedback" labelText="Feedback"
            placeHolderText="Escribe aquí la retroalimentación del estudiante..." />

        </div>



        <div class="form-actions">

          <app-button type="submit" text="Actualizar evaluación" />

        </div>


      </form>


    </main>


  </div>


</div>

}
