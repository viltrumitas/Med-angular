<div class="submission-container">
  @if (isLoading()) {
    <div class="loading-state">
      <div class="spinner"></div>
      <p>Cargando submission...</p>
    </div>
  } @else if (error()) {
    <div class="error-state">
      <span class="error-icon">⚠️</span>
      <p class="error">{{ error() }}</p>
    </div>
  } @else if (submissions(); as item) {
    <div class="header">
      <h2>Submission #{{ item.id }}</h2>

      <div class="status">
        <span>{{ item.status }}</span>
      </div>
    </div>

    <!-- FORM -->
    \
    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="clinical-card">
        <h2>Area Clinical</h2>
        <app-clinical [group]="form.controls.clinical"></app-clinical>
      </div>
      <div class="diagnostic-card">
        <h2>Diagnosticos</h2>
        <app-diagnostic [group]="form.controls.diagnostic"></app-diagnostic>
      </div>
      <div class="treatments-card">
        <h2>Tratamientos</h2>
        <app-treatment [group]="form.controls.treatment"></app-treatment>
      </div>
    </form>

    <!-- ACTIONS -->
    <div class="actions-container">
      <app-button text="Guardar cambios" variant="secondary" (clicked)="save()"></app-button>

      <app-button text="Enviar submission" variant="primary" (clicked)="submit()"></app-button>
    </div>
  }
</div>
